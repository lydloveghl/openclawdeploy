<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenClawDeploy 安装器</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar card">
        <div>
          <div class="eyebrow">OpenClawDeploy</div>
          <h1>部署向导</h1>
          <p class="muted">
            按照实际部署流程一步步来：先确认环境，再选模型，再接渠道，再选技能，最后预览并执行。
          </p>
        </div>
        <ol class="steps" id="stepNav"></ol>
        <div class="sidebar-footer">
          <div class="meta" id="platformInfo"></div>
          <div class="meta" id="catalogInfo">正在扫描本地可用模型与 skills…</div>
        </div>
      </aside>

      <main class="main">
        <section class="card hero">
          <div>
            <div class="eyebrow" id="stepBadge">步骤 1 / 5</div>
            <h2 id="stepTitle">欢迎</h2>
            <p class="muted lead" id="stepLead"></p>
          </div>
          <div class="hero-actions">
            <button id="reloadCatalogBtn" class="ghost">重新扫描模型 / skills</button>
          </div>
        </section>

        <section class="card" id="stepContent"></section>

        <section class="card logs-card" id="logsCard">
          <div class="section-head">
            <div>
              <h3>执行日志</h3>
              <p class="muted">Dry Run 和正式安装都会把完整输出显示在这里。</p>
            </div>
          </div>
          <pre id="logs">还没开始。你可以先走完整个向导，到最后一页再做 Dry Run 或正式安装。</pre>
        </section>

        <section class="card nav-card">
          <div class="wizard-nav">
            <button id="prevBtn" class="ghost">上一步</button>
            <div class="nav-right">
              <button id="planBtn" class="secondary hidden">先做 Dry Run</button>
              <button id="runBtn" class="primary hidden">开始安装</button>
              <button id="nextBtn" class="primary">下一步</button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="./app.js" type="module"></script>
  </body>
</html>
